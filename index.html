<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auralia - Jabones y Velas Artesanales</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
/* ==========================================
   AURALIA - E-commerce Complete Styles
   ========================================== */

:root {
    --bg-default: #FAF9F6;
    --bg-muted: #EFE8DC;
    --bg-paper: #FFFFFF;
    --primary: #0B1D3A;
    --primary-hover: #15305B;
    --text-primary: #0B1D3A;
    --text-secondary: #4A5D78;
    --text-muted: #8A9BAE;
    --border: #EADDCA;
    --font-heading: 'Cormorant Garamond', serif;
    --font-body: 'Manrope', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background-color: var(--bg-default); color: var(--text-primary); line-height: 1.6; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; height: auto; display: block; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
ul, ol { list-style: none; }

h1, h2, h3, h4, h5, h6 { font-family: var(--font-heading); font-weight: 500; letter-spacing: -0.02em; line-height: 1.2; }
h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); }
h2 { font-size: clamp(2rem, 4vw, 3rem); }
h3 { font-size: clamp(1.5rem, 3vw, 2rem); }

.label { text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.2em; color: var(--text-muted); display: block; margin-bottom: 0.5rem; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
.hidden { display: none !important; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 1rem 2rem; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.05em; transition: background-color 0.2s, transform 0.2s; }
.btn:hover { transform: translateY(-2px); }
.btn-primary { background-color: var(--primary); color: white; }
.btn-primary:hover { background-color: var(--primary-hover); }
.btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
.btn-outline:hover { background-color: var(--primary); color: white; }
.btn-full { width: 100%; }
.btn-sm { padding: 0.5rem 1rem; font-size: 0.75rem; }

/* Header */
.header { position: sticky; top: 0; z-index: 100; background: rgba(250, 249, 246, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
.header-container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 80px; }
.logo { height: 100px; width: auto; object-fit: contain; display: block; cursor: pointer;}
.nav { display: flex; align-items: center; gap: 2rem; }
.nav-link { font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); transition: color 0.2s; cursor: pointer; }
.nav-link:hover, .nav-link.active { color: var(--primary); }
.header-actions { display: flex; align-items: center; gap: 1rem; }
.cart-btn { position: relative; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
.cart-btn:hover { background-color: var(--bg-muted); }
.cart-count { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: var(--primary); color: white; font-size: 0.625rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.menu-btn { display: none; width: 44px; height: 44px; align-items: center; justify-content: center; color: var(--primary); }

@media (max-width: 768px) {
    .nav { position: fixed; top: 80px; left: 0; right: 0; background: var(--bg-default); border-bottom: 1px solid var(--border); flex-direction: column; padding: 1rem 1.5rem; gap: 0; transform: translateY(-100%); opacity: 0; visibility: hidden; transition: transform 0.3s, opacity 0.3s; }
    .nav.open { transform: translateY(0); opacity: 1; visibility: visible; }
    .nav-link { padding: 1rem 0; width: 100%; border-bottom: 1px solid var(--border); }
    .menu-btn { display: flex; }
}

/* Cart Drawer */
.cart-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 199; opacity: 0; visibility: hidden; transition: opacity 0.3s; }
.cart-overlay.open { opacity: 1; visibility: visible; }
.cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 420px; background: var(--bg-default); z-index: 200; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; border-left: 1px solid var(--border); }
.cart-drawer.open { transform: translateX(0); }
.cart-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid var(--border); }
.cart-header h2 { font-size: 1.5rem; }
.close-cart { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
.cart-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--text-muted); }
.cart-empty i { font-size: 3rem; margin-bottom: 1rem; color: var(--border); }
.cart-item { display: flex; gap: 1rem; padding: 1rem; background: white; border: 1px solid var(--border); margin-bottom: 1rem; }
.cart-item-image { width: 80px; height: 80px; object-fit: cover; }
.cart-item-info { flex: 1; }
.cart-item-name { font-family: var(--font-heading); font-size: 1.125rem; color: var(--primary); }
.cart-item-size { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
.cart-item-price { font-weight: 500; color: var(--primary); margin-top: 0.25rem; }
.cart-item-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; }
.quantity-control { display: flex; align-items: center; border: 1px solid var(--border); }
.quantity-control button { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.quantity-control button:hover { background-color: var(--bg-muted); }
.quantity-control span { width: 32px; text-align: center; font-size: 0.875rem; }
.remove-item { color: var(--text-muted); padding: 0.5rem; }
.remove-item:hover { color: #ef4444; }
.cart-footer { padding: 1.5rem; border-top: 1px solid var(--border); display: none; }
.cart-footer.show { display: block; }
.cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.cart-total span:first-child { color: var(--text-secondary); }
.cart-total span:last-child { font-family: var(--font-heading); font-size: 1.5rem; color: var(--primary); }

/* Hero Section */
.hero { position: relative; min-height: 90vh; display: flex; align-items: center; }
.hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(250, 249, 246, 0.95) 0%, rgba(250, 249, 246, 0.7) 50%, rgba(250, 249, 246, 0.3) 100%); }
.hero-content { position: relative; z-index: 1; max-width: 600px; margin-left: 5%; padding: 0 1.5rem; }
.hero-content h1 { margin: 0.5rem 0 1.5rem; color: var(--primary); }
.hero-content p { color: var(--text-secondary); font-size: 1.125rem; margin-bottom: 2rem; }
.hero-btns { display: flex; flex-wrap: wrap; gap: 1rem; }

/* Page Hero */
.page-hero { position: relative; height: 50vh; min-height: 400px; display: flex; align-items: center; }
.page-hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
.page-hero-overlay { position: absolute; inset: 0; background: rgba(11, 29, 58, 0.5); }
.page-hero-content { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; color: white; }
.page-hero-content .label { color: rgba(255, 255, 255, 0.7); }
.page-hero-content p { max-width: 600px; color: rgba(255, 255, 255, 0.8); }

/* Sections */
.section { padding: 6rem 0; }
.section-alt { background-color: var(--bg-muted); }
.section-header { display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: space-between; gap: 1rem; margin-bottom: 3rem; }
.section-header.center { flex-direction: column; align-items: center; text-align: center; }
.link-arrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-secondary); }
.link-arrow:hover { color: var(--primary); }

/* Products Grid */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
.product-card { display: block; transition: transform 0.3s; cursor: pointer; }
.product-card:hover { transform: translateY(-4px); }
.product-card:hover .product-image img { transform: scale(1.05); }
.product-image { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--bg-muted); }
.product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.product-info { padding-top: 1rem; }
.product-scent { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); }
.product-name { font-family: var(--font-heading); font-size: 1.25rem; color: var(--primary); margin: 0.25rem 0; }
.product-card:hover .product-name { color: var(--primary-hover); }
.product-description { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-price { font-weight: 500; color: var(--primary); }

/* CTA Grid */
.cta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.cta-content p { color: var(--text-secondary); margin-bottom: 2rem; max-width: 400px; }
.cta-image img { width: 100%; height: 400px; object-fit: cover; }
@media (max-width: 768px) { .cta-grid { grid-template-columns: 1fr; gap: 2rem; } }

/* Categories Grid */
.categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
.category-card { position: relative; aspect-ratio: 4/3; overflow: hidden; display: block; cursor: pointer; }
.category-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.category-card:hover img { transform: scale(1.05); }
.category-overlay { position: absolute; inset: 0; background: rgba(11, 29, 58, 0.4); transition: background-color 0.3s; }
.category-card:hover .category-overlay { background: rgba(11, 29, 58, 0.5); }
.category-content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
.category-content .label { color: rgba(255, 255, 255, 0.8); }
.category-content h3 { font-size: 2.5rem; }
@media (max-width: 768px) { .categories-grid { grid-template-columns: 1fr; } }

/* Footer */
.footer { background: var(--primary); color: white; padding: 5rem 0 2rem; margin-top: 6rem; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 4rem; }
.footer-brand h2 { font-size: 2rem; margin-bottom: 1rem; }
.footer-brand p { color: var(--text-muted); font-size: 0.875rem; max-width: 400px; }
.footer-links h4, .footer-contact h4 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255, 255, 255, 0.7); margin-bottom: 1rem; font-family: var(--font-body); font-weight: 500; }
.footer-links a, .footer-contact p { display: block; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 0.75rem; }
.footer-links a:hover { color: white; }
.footer-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 2rem; margin-top: 3rem; border-top: 1px solid rgba(255, 255, 255, 0.1); }
.footer-bottom p, .footer-bottom span { font-size: 0.75rem; color: var(--text-muted); cursor: pointer; }
.footer-bottom span:hover { color: white; }
@media (max-width: 768px) { .footer-grid { grid-template-columns: 1fr; gap: 2rem; } .footer-bottom { flex-direction: column; gap: 1rem; } }

/* Product Detail */
.product-detail { padding: 2rem 0 6rem; }
.back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 2rem; cursor: pointer; }
.back-link:hover { color: var(--primary); }
.product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
.product-detail-image { position: sticky; top: 100px; aspect-ratio: 1; background: var(--bg-muted); }
.product-detail-image img { width: 100%; height: 100%; object-fit: cover; }
.product-detail-info { padding: 1rem 0; }
.product-detail-info h1 { margin-bottom: 1rem; }
.product-detail-info > p { color: var(--text-secondary); font-size: 1.125rem; margin-bottom: 2rem; }
.product-ingredients { margin-bottom: 2rem; }
.product-ingredients h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 0.75rem; font-family: var(--font-body); font-weight: 500; }
.ingredients-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.ingredient-tag { padding: 0.5rem 1rem; background: var(--bg-muted); font-size: 0.875rem; color: var(--text-secondary); }

/* Size Selector */
.size-selector { margin-bottom: 2rem; }
.size-selector h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 0.75rem; font-family: var(--font-body); font-weight: 500; }
.size-options { display: flex; gap: 1rem; }
.size-option { padding: 1rem 1.5rem; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: border-color 0.2s, background-color 0.2s, color 0.2s; }
.size-option:hover { border-color: var(--primary); }
.size-option.active { border-color: var(--primary); background: var(--primary); color: white; }
.size-option .size-name { font-size: 0.875rem; display: block; }
.size-option .size-price { font-family: var(--font-heading); font-size: 1.25rem; display: block; margin-top: 0.25rem; }

/* Quantity Selector */
.quantity-selector { margin-bottom: 2rem; }
.quantity-selector h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 0.75rem; font-family: var(--font-body); font-weight: 500; }
.quantity-input { display: inline-flex; align-items: center; border: 1px solid var(--border); }
.quantity-input button { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.quantity-input button:hover { background: var(--bg-muted); }
.quantity-input span { width: 48px; text-align: center; font-weight: 500; }

/* Add to Cart */
.add-to-cart-section { display: flex; flex-wrap: wrap; align-items: center; gap: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.total-price span:first-child { font-size: 0.75rem; color: var(--text-muted); display: block; }
.total-price span:last-child { font-family: var(--font-heading); font-size: 2rem; color: var(--primary); }
.stock-info { display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); font-size: 0.875rem; margin-top: 1.5rem; }
.stock-info i { color: #22c55e; }
@media (max-width: 768px) { .product-detail-grid { grid-template-columns: 1fr; gap: 2rem; } .product-detail-image { position: relative; top: 0; } }

/* Customizer */
.customizer-section { padding: 4rem 0 6rem; }
.customizer-container { max-width: 800px; margin: 0 auto; }
.steps-progress { display: flex; align-items: center; justify-content: center; margin-bottom: 3rem; }
.step-indicator { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 1.25rem; background: var(--bg-muted); color: var(--text-muted); cursor: pointer; }
.step-indicator.active, .step-indicator.completed { background: var(--primary); color: white; }
.step-line { width: 40px; height: 2px; background: var(--border); margin: 0 0.5rem; }
.step-line.completed { background: var(--primary); }
.customizer-card { background: white; padding: 2.5rem; border: 1px solid var(--border); }
.customizer-header { text-align: center; margin-bottom: 2rem; }
.customizer-header h2 { margin-top: 0.5rem; }
.customizer-header p { color: var(--text-muted); }

.options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
.option-btn { padding: 1.5rem; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: border-color 0.2s, background-color 0.2s, color 0.2s; }
.option-btn:hover { border-color: var(--primary); }
.option-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
.option-btn .option-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
.option-btn .option-label { font-size: 0.875rem; }

.color-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.color-btn { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1rem; border: 1px solid transparent; cursor: pointer; }
.color-btn.active { border-color: var(--primary); }
.color-swatch { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--border); transition: transform 0.2s; }
.color-btn:hover .color-swatch { transform: scale(1.1); }
.color-btn.active .color-swatch { border-color: var(--primary); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--primary); }
.color-label { font-size: 0.75rem; color: var(--text-secondary); }

.scent-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
.scent-btn { padding: 1rem; border: 1px solid var(--border); text-align: left; cursor: pointer; }
.scent-btn:hover { border-color: var(--primary); }
.scent-btn.active { border-color: var(--primary); background: var(--bg-muted); }
.scent-name { font-weight: 500; color: var(--primary); display: block; }
.scent-desc { font-size: 0.875rem; color: var(--text-muted); display: block; margin-top: 0.25rem; }

.ingredient-note { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem; }
.ingredient-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
.ingredient-btn { padding: 0.75rem 1rem; border: 1px solid var(--border); text-align: left; cursor: pointer; }
.ingredient-btn:hover:not(:disabled) { border-color: var(--primary); }
.ingredient-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
.ingredient-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ingredient-name { font-size: 0.875rem; font-weight: 500; display: block; }
.ingredient-benefit { font-size: 0.75rem; opacity: 0.7; display: block; margin-top: 0.25rem; }

.size-options-customizer { display: flex; flex-direction: column; gap: 1rem; }
.size-btn { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border: 1px solid var(--border); cursor: pointer; }
.size-btn:hover { border-color: var(--primary); }
.size-btn.active { border-color: var(--primary); background: var(--bg-muted); }
.size-btn-info .size-btn-name { font-weight: 500; color: var(--primary); display: block; }
.size-btn-info .size-btn-weight { font-size: 0.875rem; color: var(--text-muted); display: block; }
.size-btn-price { font-family: var(--font-heading); font-size: 1.25rem; color: var(--primary); }

.customizer-nav { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); }
.selection-preview { margin-top: 2rem; padding: 1.5rem; background: var(--bg-muted); }
.selection-preview h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 1rem; font-family: var(--font-body); font-weight: 500; }
.selection-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.selection-tag { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: white; border: 1px solid var(--border); font-size: 0.875rem; }
.selection-tag .color-dot { width: 16px; height: 16px; border-radius: 50%; }

@media (max-width: 768px) { .options-grid { grid-template-columns: repeat(2, 1fr); } .scent-options, .ingredient-options { grid-template-columns: 1fr; } }

/* Checkout Page */
.checkout-section { padding: 2rem 0 6rem; }
.checkout-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; }
.checkout-form { display: flex; flex-direction: column; gap: 1.5rem; }
.form-card { background: white; padding: 1.5rem; border: 1px solid var(--border); }
.form-card h2 { font-size: 1.25rem; margin-bottom: 1.5rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 0.5rem; }
.form-group.full { grid-column: span 2; }
.form-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); }
.form-input, .form-textarea { padding: 0.75rem 1rem; border: 1px solid var(--border); font-family: inherit; font-size: 1rem; }
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
.form-textarea { resize: vertical; min-height: 100px; }
.form-note { text-align: center; font-size: 0.875rem; color: var(--text-muted); margin-top: 1rem; }

.order-summary { position: sticky; top: 100px; background: white; padding: 1.5rem; border: 1px solid var(--border); height: fit-content; }
.order-summary h2 { font-size: 1.25rem; margin-bottom: 1.5rem; }
.order-items { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
.order-item { display: flex; gap: 1rem; }
.order-item-image { width: 64px; height: 64px; object-fit: cover; }
.order-item-info { flex: 1; }
.order-item-name { font-size: 0.875rem; font-weight: 500; color: var(--primary); }
.order-item-size { font-size: 0.75rem; color: var(--text-muted); }
.order-item-price { font-size: 0.875rem; color: var(--primary); margin-top: 0.25rem; }
.order-totals { border-top: 1px solid var(--border); padding-top: 1rem; }
.order-total-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.875rem; }
.order-total-row span:first-child { color: var(--text-secondary); }
.order-total-row.total { padding-top: 0.5rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
.order-total-row.total span:first-child { font-weight: 500; color: var(--primary); }

let selectedSize = 'small';
let selectedPrice = 0;
let productQty = 1;

function selectProductSize(el, price) {
    document.querySelectorAll('.size-option').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedSize = el.dataset.size;
    selectedPrice = price;
    updateProductTotal();
}

function changeProductQty(delta) {
    productQty = Math.max(1, productQty + delta);
    document.getElementById('productQty').textContent = productQty;
    updateProductTotal();
}

function updateProductTotal() {
    const p = products.find(prod => prod.id === currentProduct);
    const price = p.prices[selectedSize];
    document.getElementById('productTotal').textContent = '$' + (price * productQty).toFixed(2);
}

function addCurrentProduct() {
    const p = products.find(prod => prod.id === currentProduct);
    const price = p.prices[selectedSize];
    addToCart({
        productId: p.id,
        name: p.name,
        size: selectedSize,
        price: price,
        quantity: productQty,
        image: p.image,
        isCustom: false
    });
    productQty = 1;
    selectedSize = 'small';
}

// Customizer
function renderCustomizer() {
    const steps = ['Forma', 'Color', 'Aroma', 'Ingredientes', 'Tamaño'];
    let stepContent = '';
    
    switch(customizerStep) {
        case 0:
            stepContent = `<div class=\"options-grid\">${customizerOptions.shapes.map(s => `
                <button class=\"option-btn ${customSoap.shape === s.id ? 'active' : ''}\" onclick=\"selectCustomShape('${s.id}')\">
                    <span class=\"option-icon\">${s.icon}</span><span class=\"option-label\">${s.label}</span>
                </button>`).join('')}</div>`;
            break;
        case 1:
            stepContent = `<div class=\"color-options\">${customizerOptions.colors.map(c => `
                <button class=\"color-btn ${customSoap.color === c.id ? 'active' : ''}\" onclick=\"selectCustomColor('${c.id}')\">
                    <span class=\"color-swatch\" style=\"background-color:${c.hex}\"></span><span class=\"color-label\">${c.label}</span>
                </button>`).join('')}</div>`;
            break;
        case 2:
            stepContent = `<div class=\"scent-options\">${customizerOptions.scents.map(s => `
                <button class=\"scent-btn ${customSoap.scent === s.id ? 'active' : ''}\" onclick=\"selectCustomScent('${s.id}')\">
                    <span class=\"scent-name\">${s.label}</span><span class=\"scent-desc\">${s.description}</span>
                </button>`).join('')}</div>`;
            break;
        case 3:
            stepContent = `<p class=\"ingredient-note\">Selecciona hasta 3 ingredientes</p>
                <div class=\"ingredient-options\">${customizerOptions.ingredients.map(i => `
                <button class=\"ingredient-btn ${customSoap.ingredients.includes(i.id) ? 'active' : ''}\" 
                    onclick=\"toggleCustomIngredient('${i.id}')\"
                    ${customSoap.ingredients.length >= 3 && !customSoap.ingredients.includes(i.id) ? 'disabled' : ''}>
                    <span class=\"ingredient-name\">${i.label}</span><span class=\"ingredient-benefit\">${i.benefit}</span>
                </button>`).join('')}</div>`;
            break;
        case 4:
            stepContent = `<div class=\"size-options-customizer\">${customizerOptions.sizes.map(s => `
                <button class=\"size-btn ${customSoap.size === s.id ? 'active' : ''}\" onclick=\"selectCustomSize('${s.id}')\">
                    <div class=\"size-btn-info\"><span class=\"size-btn-name\">${s.label}</span><span class=\"size-btn-weight\">${s.weight}</span></div>
                    <span class=\"size-btn-price\">$${s.price.toFixed(2)}</span>
                </button>`).join('')}</div>`;
            break;
    }
    
    const canProceed = (customizerStep === 0 && customSoap.shape) || 
                       (customizerStep === 1 && customSoap.color) || 
                       (customizerStep === 2 && customSoap.scent) || 
                       (customizerStep === 3 && customSoap.ingredients.length > 0) || 
                       (customizerStep === 4 && customSoap.size);
    
    const previewTags = [];
    if (customSoap.shape) previewTags.push(`Forma: ${customizerOptions.shapes.find(s => s.id === customSoap.shape).label}`);
    if (customSoap.color) { const c = customizerOptions.colors.find(x => x.id === customSoap.color); previewTags.push(`<span class=\"selection-tag\">Color: <span class=\"color-dot\" style=\"background:${c.hex}\"></span> ${c.label}</span>`); }
    if (customSoap.scent) previewTags.push(`Aroma: ${customizerOptions.scents.find(s => s.id === customSoap.scent).label}`);
    if (customSoap.ingredients.length) previewTags.push(`${customSoap.ingredients.length} ingrediente(s)`);
    if (customSoap.size) { const sz = customizerOptions.sizes.find(s => s.id === customSoap.size); previewTags.push(`${sz.label}: $${sz.price.toFixed(2)}`); }
    
    return `
    <section class=\"page-hero\">
        <div class=\"page-hero-bg\" style=\"background-image: url('https://images.pexels.com/photos/4871293/pexels-photo-4871293.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940');\"></div>
        <div class=\"page-hero-overlay\"></div>
        <div class=\"page-hero-content\" style=\"text-align:center\">
            <i class=\"fas fa-sparkles\" style=\"font-size:2rem;margin-bottom:1rem\"></i>
            <h1>Crea tu Producto</h1>
            <p style=\"margin:0 auto\">Diseña tu producto único según tus preferencias</p>
        </div>
    </section>
    <section class=\"customizer-section\">
        <div class=\"container\">
            <div class=\"customizer-container\">
                <div class=\"steps-progress\">
                    ${steps.map((_, i) => `
                        <div class=\"step-indicator ${i === customizerStep ? 'active' : i < customizerStep ? 'completed' : ''}\" onclick=\"goToCustomizerStep(${i})\">
                            ${i < customizerStep ? '<i class=\"fas fa-check\"></i>' : i + 1}
                        </div>
                        ${i < 4 ? `<div class=\"step-line ${i < customizerStep ? 'completed' : ''}\"></div>` : ''}
                    `).join('')}
                </div>
                <div class=\"customizer-card\">
                    <div class=\"customizer-header\">
                        <span class=\"label\">PASO ${customizerStep + 1} DE 5</span>
                        <h2>${steps[customizerStep]}</h2>
                    </div>
                    ${stepContent}
                    <div class=\"customizer-nav\">
                        <button class=\"btn btn-outline\" onclick=\"prevCustomizerStep()\" ${customizerStep === 0 ? 'style=\"visibility:hidden\"' : ''}>
                            <i class=\"fas fa-arrow-left\"></i> Atrás
                        </button>
                        ${customizerStep === 4 ? 
                            `<button class=\"btn btn-primary\" onclick=\"addCustomToCart()\" ${!canProceed ? 'disabled' : ''}><i class=\"fas fa-shopping-bag\"></i> Añadir al Carrito</button>` :
                            `<button class=\"btn btn-primary\" onclick=\"nextCustomizerStep()\" ${!canProceed ? 'disabled' : ''}>Siguiente <i class=\"fas fa-arrow-right\"></i></button>`
                        }
                    </div>
                </div>
                <div class=\"selection-preview\">
                    <h3>Tu Selección</h3>
                    <div class=\"selection-tags\">${previewTags.length ? previewTags.map(t => t.includes('selection-tag') ? t : `<span class=\"selection-tag\">${t}</span>`).join('') : '<span class=\"selection-tag\">Ninguna selección</span>'}</div>
                </div>
            </div>
        </div>
    </section>`;
}


function selectCustomShape(id) { customSoap.shape = id; render(); }
function selectCustomColor(id) { customSoap.color = id; render(); }
function selectCustomScent(id) { customSoap.scent = id; render(); }
function selectCustomSize(id) { customSoap.size = id; render(); }
function toggleCustomIngredient(id) {
    const idx = customSoap.ingredients.indexOf(id);
    if (idx >= 0) customSoap.ingredients.splice(idx, 1);
    else if (customSoap.ingredients.length < 3) customSoap.ingredients.push(id);
    render();
}
function nextCustomizerStep() { if (customizerStep < 4) { customizerStep++; render(); } }
function prevCustomizerStep() { if (customizerStep > 0) { customizerStep--; render(); } }
function goToCustomizerStep(step) { if (step <= customizerStep) { customizerStep = step; render(); } }

function addCustomToCart() {
    const size = customizerOptions.sizes.find(s => s.id === customSoap.size);
    addToCart({
        productId: 'custom-' + Date.now(),
        name: 'Jabón Personalizado',
        size: customSoap.size,
        price: size.price,
        quantity: 1,
        image: 'https://images.pexels.com/photos/3735152/pexels-photo-3735152.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940',
        isCustom: true,
        customDetails: {
            shape: customizerOptions.shapes.find(s => s.id === customSoap.shape).label,
            color: customizerOptions.colors.find(c => c.id === customSoap.color).label,
            scent: customizerOptions.scents.find(s => s.id === customSoap.scent).label,
            ingredients: customSoap.ingredients.map(id => customizerOptions.ingredients.find(i => i.id === id).label)
        }
    });
    customSoap = { shape: '', color: '', scent: '', ingredients: [], size: 'medium' };
    customizerStep = 0;
    navigate('checkout');
}

let lastOrderId = '';

function submitOrder(e) {
    e.preventDefault();
    const form = e.target;
    
    // Crear el mensaje para WhatsApp
    let message = `🛍️ *NUEVA COTIZACIÓN - ${STORE_NAME}*

`;
    message += `👤 *Cliente:* ${form.name.value}
`;
    message += `📧 *Email:* ${form.email.value}
`;
    message += `📱 *Teléfono:* ${form.phone.value}
`;
    message += `📍 *Dirección:* ${form.address.value}, ${form.city.value} ${form.postal_code.value}
`;
    
    if (form.notes.value) {
        message += `📝 *Notas:* ${form.notes.value}
`;
    }
    
    message += `
━━━━━━━━━━━━━━━━━━━━
`;
    message += `📦 *PRODUCTOS:*

`;
    
    cart.forEach((item, idx) => {
        message += `${idx + 1}. *${item.name}*
`;
        message += `   Tamaño: ${sizeLabels[item.size]}
`;
        message += `   Cantidad: ${item.quantity}
`;
        message += `   Precio: $${(item.price * item.quantity).toFixed(2)}
`;
        if (item.isCustom && item.customDetails) {
            message += `   ✨ Personalizado:
`;
            message += `      - Forma: ${item.customDetails.shape}
`;
            message += `      - Color: ${item.customDetails.color}
`;
            message += `      - Aroma: ${item.customDetails.scent}
`;
            message += `      - Ingredientes: ${item.customDetails.ingredients.join(', ')}
`;
        }
        message += `
`;
    });
    
    message += `━━━━━━━━━━━━━━━━━━━━
`;
    message += `💰 *TOTAL: $${getCartTotal().toFixed(2)}*
`;
    message += `(Envío a calcular)

`;
    message += `¡Gracias por tu interés! 🙏`;
    
    // Guardar pedido localmente
    const order = {
        id: 'order-' + Date.now(),
        items: [...cart],
        customer: {
            name: form.name.value,
            email: form.email.value,
            phone: form.phone.value,
            address: form.address.value,
            city: form.city.value,
            postalCode: form.postal_code.value,
            notes: form.notes.value
        },
        total: getCartTotal(),
        status: 'pending',
        createdAt: new Date().toISOString()
    };
    orders.unshift(order);
    saveOrders();
    lastOrderId = order.id;
    
    // Abrir WhatsApp con el mensaje
    const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, '_blank');
    
    // Limpiar carrito y mostrar confirmación
    cart = [];
    saveCart();
    navigate('orderComplete');
    showToast('¡Cotización enviada por WhatsApp!');
}

                        ${products.map(p => `
                            <tr>
                                <td><div class=\"product-cell\"><img src=\"${p.image}\" alt=\"${p.name}\"><span>${p.name}${p.featured ? '<span class=\"featured-badge\">Destacado</span>' : ''}</span></div></td>
                                <td>${p.category === 'soap' ? 'Jabón' : 'Vela'}</td>
                                <td>$${p.prices.small} / $${p.prices.medium} / $${p.prices.large}</td>
                                <td>${p.stock.small + p.stock.medium + p.stock.large} uds</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`;
    } else if (adminTab === 'orders') {
        const statusLabels = { pending: 'Pendiente', confirmed: 'Confirmado', shipped: 'Enviado', delivered: 'Entregado', cancelled: 'Cancelado' };
        content = `
            <div class=\"admin-header\"><h1>Pedidos</h1></div>
            ${orders.length === 0 ? '<div class=\"admin-table-container\" style=\"padding:3rem;text-align:center\"><p>No hay pedidos todavía</p></div>' : `
            <div class=\"admin-table-container\">
                <table class=\"admin-table\">
                    <thead><tr><th>Pedido</th><th>Cliente</th><th>Total</th><th>Estado</th><th>Fecha</th></tr></thead>
                    <tbody>
                        ${orders.map(o => `
                            <tr>
                                <td>#${o.id.slice(-8).toUpperCase()}</td>
                                <td>${o.customer.name}<br><small style=\"color:var(--text-muted)\">${o.customer.email}</small></td>
                                <td>$${o.total.toFixed(2)}</td>
                                <td>
                                    <select class=\"admin-select\" onchange=\"updateOrderStatus('${o.id}', this.value)\">
                                        ${Object.entries(statusLabels).map(([k, v]) => `<option value=\"${k}\" ${o.status === k ? 'selected' : ''}>${v}</option>`).join('')}
                                    </select>
                                </td>
                                <td>${new Date(o.createdAt).toLocaleDateString('es-ES')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`}`;
    }
    
    return `
    <div class=\"admin-layout\">
        <aside class=\"admin-sidebar\">
            <div class=\"admin-logo\"><span>Auralia</span><small>Panel Admin</small></div>
            <nav class=\"admin-nav\">
                <div class=\"${adminTab === 'dashboard' ? 'active' : ''}\" onclick=\"setAdminTab('dashboard')\"><i class=\"fas fa-chart-line\"></i> Dashboard</div>
                <div class=\"${adminTab === 'products' ? 'active' : ''}\" onclick=\"setAdminTab('products')\"><i class=\"fas fa-box\"></i> Productos</div>
                <div class=\"${adminTab === 'orders' ? 'active' : ''}\" onclick=\"setAdminTab('orders')\"><i class=\"fas fa-shopping-cart\"></i> Pedidos</div>
            </nav>
            <div class=\"admin-back\" onclick=\"navigate('home')\"><i class=\"fas fa-arrow-left\"></i> Volver a la tienda</div>
        </aside>
        <main class=\"admin-main\">${content}</main>
    </div>`;
}

function setAdminTab(tab) { adminTab = tab; render(); }

function updateOrderStatus(id, status) {
    const order = orders.find(o => o.id === id);
    if (order) { order.status = status; saveOrders(); showToast('Estado actualizado'); }
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    render();
});
    </script>
</body>
</html>
