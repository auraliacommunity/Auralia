/* ==========================================
   AURALIA - E-commerce Complete Styles
   ========================================== */

:root {
    --bg-default: #FAF9F6;
    --bg-muted: #EFE8DC;
    --bg-paper: #FFFFFF;
    --primary: #0B1D3A;
    --primary-hover: #15305B;
    --text-primary: #0B1D3A;
    --text-secondary: #4A5D78;
    --text-muted: #8A9BAE;
    --border: #EADDCA;
    --font-heading: 'Cormorant Garamond', serif;
    --font-body: 'Manrope', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background-color: var(--bg-default); color: var(--text-primary); line-height: 1.6; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; height: auto; display: block; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
ul, ol { list-style: none; }

h1, h2, h3, h4, h5, h6 { font-family: var(--font-heading); font-weight: 500; letter-spacing: -0.02em; line-height: 1.2; }
h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); }
h2 { font-size: clamp(2rem, 4vw, 3rem); }
h3 { font-size: clamp(1.5rem, 3vw, 2rem); }

.label { text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.2em; color: var(--text-muted); display: block; margin-bottom: 0.5rem; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
.hidden { display: none !important; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 1rem 2rem; font-size: 0.875rem; font-weight: 500; letter-spacing: 0.05em; transition: background-color 0.2s, transform 0.2s; }
.btn:hover { transform: translateY(-2px); }
.btn-primary { background-color: var(--primary); color: white; }
.btn-primary:hover { background-color: var(--primary-hover); }
.btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
.btn-outline:hover { background-color: var(--primary); color: white; }
.btn-full { width: 100%; }
.btn-sm { padding: 0.5rem 1rem; font-size: 0.75rem; }

/* Header */
.header { position: sticky; top: 0; z-index: 100; background: rgba(250, 249, 246, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
.header-container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 80px; }
.logo { height: 100px; width: auto; object-fit: contain; display: block; cursor: pointer;}
.nav { display: flex; align-items: center; gap: 2rem; }
.nav-link { font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); transition: color 0.2s; cursor: pointer; }
.nav-link:hover, .nav-link.active { color: var(--primary); }
.header-actions { display: flex; align-items: center; gap: 1rem; }
.cart-btn { position: relative; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
.cart-btn:hover { background-color: var(--bg-muted); }
.cart-count { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: var(--primary); color: white; font-size: 0.625rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.menu-btn { display: none; width: 44px; height: 44px; align-items: center; justify-content: center; color: var(--primary); }

@media (max-width: 768px) {
    .nav { position: fixed; top: 80px; left: 0; right: 0; background: var(--bg-default); border-bottom: 1px solid var(--border); flex-direction: column; padding: 1rem 1.5rem; gap: 0; transform: translateY(-100%); opacity: 0; visibility: hidden; transition: transform 0.3s, opacity 0.3s; }
    .nav.open { transform: translateY(0); opacity: 1; visibility: visible; }
    .nav-link { padding: 1rem 0; width: 100%; border-bottom: 1px solid var(--border); }
    .menu-btn { display: flex; }
}

/* Cart Drawer */
.cart-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 199; opacity: 0; visibility: hidden; transition: opacity 0.3s; }
.cart-overlay.open { opacity: 1; visibility: visible; }
.cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 420px; background: var(--bg-default); z-index: 200; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; border-left: 1px solid var(--border); }
.cart-drawer.open { transform: translateX(0); }
.cart-header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid var(--border); }

.cart-item-name { font-family: var(--font-heading); font-size: 1.125rem; color: var(--primary); }
.cart-item-size { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
.cart-item-price { font-weight: 500; color: var(--primary); margin-top: 0.25rem; }
.cart-item-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; }
.quantity-control { display: flex; align-items: center; border: 1px solid var(--border); }
.quantity-control button { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.quantity-control button:hover { background-color: var(--bg-muted); }
.quantity-control span { width: 32px; text-align: center; font-size: 0.875rem; }

.cart-total span:first-child { color: var(--text-secondary); }
.cart-total span:last-child { font-family: var(--font-heading); font-size: 1.5rem; color: var(--primary); }

/* Hero Section */
.hero { position: relative; min-height: 90vh; display: flex; align-items: center; }
.hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(250, 249, 246, 0.95) 0%, rgba(250, 249, 246, 0.7) 50%, rgba(250, 249, 246, 0.3) 100%); }

.hero-btns { display: flex; flex-wrap: wrap; gap: 1rem; }

/* Page Hero */
.page-hero { position: relative; height: 50vh; min-height: 400px; display: flex; align-items: center; }
.page-hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
.page-hero-overlay { position: absolute; inset: 0; background: rgba(11, 29, 58, 0.5); }
.page-hero-content { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; color: white; }
.page-hero-content .label { color: rgba(255, 255, 255, 0.7); }

/* Sections */
.section { padding: 6rem 0; }
.section-alt { background-color: var(--bg-muted); }
.section-header { display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: space-between; gap: 1rem; margin-bottom: 3rem; }
.section-header.center { flex-direction: column; align-items: center; text-align: center; }
.link-arrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-secondary); }
.link-arrow:hover { color: var(--primary); }

/* Products Grid */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
.product-card { display: block; transition: transform 0.3s; cursor: pointer; }
.product-card:hover { transform: translateY(-4px); }
.product-card:hover .product-image img { transform: scale(1.05); }
.product-image { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--bg-muted); }
.product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.product-info { padding-top: 1rem; }
.product-scent { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); }
.product-name { font-family: var(--font-heading); font-size: 1.25rem; color: var(--primary); margin: 0.25rem 0; }
.product-card:hover .product-name { color: var(--primary-hover); }
.product-description { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-price { font-weight: 500; color: var(--primary); }

/* CTA Grid */
.cta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.cta-content p { color: var(--text-secondary); margin-bottom: 2rem; max-width: 400px; }
.cta-image img { width: 100%; height: 400px; object-fit: cover; }

/* Categories Grid - MODIFICADO */
.categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
.categories-grid-full { display: grid; grid-template-columns: 1fr; gap: 2rem; margin-top: 2rem; }
.category-card { position: relative; aspect-ratio: 4/3; overflow: hidden; display: block; cursor: pointer; }
.category-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.category-card:hover img { transform: scale(1.05); }
.category-overlay { position: absolute; inset: 0; background: rgba(11, 29, 58, 0.4); transition: background-color 0.3s; }
.category-card:hover .category-overlay { background: rgba(11, 29, 58, 0.5); }
.category-content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }

/* Footer */
.footer { background: var(--primary); color: white; padding: 5rem 0 2rem; margin-top: 6rem; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 4rem; }

.footer-links h4, .footer-contact h4 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255, 255, 255, 0.7); margin-bottom: 1rem; font-family: var(--font-body); font-weight: 500; }
.footer-links a, .footer-contact p { display: block; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 0.75rem; }

.footer-bottom p, .footer-bottom span { font-size: 0.75rem; color: var(--text-muted); cursor: pointer; }
.footer-bottom span:hover { color: white; }
@media (max-width: 768px) { .footer-grid { grid-template-columns: 1fr; gap: 2rem; } .footer-bottom { flex-direction: column; gap: 1rem; } }

/* Product Detail */
.product-detail { padding: 2rem 0 6rem; }

.back-link:hover { color: var(--primary); }
.product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
.product-detail-image { position: sticky; top: 100px; aspect-ratio: 1; background: var(--bg-muted); }
.product-detail-image img { width: 100%; height: 100%; object-fit: cover; }

.ingredients-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }

.size-selector { margin-bottom: 2rem; }

.quantity-input { display: inline-flex; align-items: center; border: 1px solid var(--border); }
.quantity-input button { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
.quantity-input button:hover { background: var(--bg-muted); }
.quantity-input span { width: 48px; text-align: center; font-weight: 500; }

/* Add to Cart */
.add-to-cart-section { display: flex; flex-wrap: wrap; align-items: center; gap: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.total-price span:first-child { font-size: 0.75rem; color: var(--text-muted); display: block; }
.total-price span:last-child { font-family: var(--font-heading); font-size: 2rem; color: var(--primary); }
.stock-info { display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); font-size: 0.875rem; margin-top: 1.5rem; }
.stock-info i { color: #22c55e; }
@media (max-width: 768px) { .product-detail-grid { grid-template-columns: 1fr; gap: 2rem; } .product-detail-image { position: relative; top: 0; } }

/* Customizer */
.customizer-section { padding: 4rem 0 6rem; }
.customizer-container { max-width: 800px; margin: 0 auto; }
.steps-progress { display: flex; align-items: center; justify-content: center; margin-bottom: 3rem; }
.step-indicator { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 1.25rem; background: var(--bg-muted); color: var(--text-muted); cursor: pointer; }
.step-indicator.active, .step-indicator.completed { background: var(--primary); color: white; }

.step-line.completed { background: var(--primary); }

.customizer-header { text-align: center; margin-bottom: 2rem; }
.customizer-header h2 { margin-top: 0.5rem; }
.customizer-header p { color: var(--text-muted); }

.options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
.option-btn { padding: 1.5rem; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: border-color 0.2s, background-color 0.2s, color 0.2s; }
.option-btn:hover { border-color: var(--primary); }
.option-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
.option-btn .option-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

.product-type-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }

.product-type-btn:hover { border-color: var(--primary); transform: translateY(-4px); }
.product-type-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
.product-type-btn .type-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
.product-type-btn .type-label { font-size: 1.25rem; font-weight: 600; display: block; }
.product-type-btn .type-price { font-size: 0.875rem; margin-top: 0.5rem; opacity: 0.8; }

.color-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.color-btn { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1rem; border: 1px solid transparent; cursor: pointer; }
.color-btn.active { border-color: var(--primary); }
.color-swatch { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--border); transition: transform 0.2s; }
.color-btn:hover .color-swatch { transform: scale(1.1); }
.color-btn.active .color-swatch { border-color: var(--primary); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--primary); }
.color-label { font-size: 0.75rem; color: var(--text-secondary); }

.scent-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
.scent-btn { padding: 1rem; border: 1px solid var(--border); text-align: left; cursor: pointer; }
.scent-btn:hover { border-color: var(--primary); }
.scent-btn.active { border-color: var(--primary); background: var(--bg-muted); }
.scent-name { font-weight: 500; color: var(--primary); display: block; }
.scent-desc { font-size: 0.875rem; color: var(--text-muted); display: block; margin-top: 0.25rem; }

.ingredient-btn:hover:not(:disabled) { border-color: var(--primary); }
.ingredient-btn.active { border-color: var(--primary); background: var(--primary); color: white; }

.ingredient-name { font-size: 0.875rem; font-weight: 500; display: block; }
.ingredient-benefit { font-size: 0.75rem; opacity: 0.7; display: block; margin-top: 0.25rem; }

.size-options-customizer { display: flex; flex-direction: column; gap: 1rem; }
.size-btn { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border: 1px solid var(--border); cursor: pointer; }
.size-btn:hover { border-color: var(--primary); }
.size-btn.active { border-color: var(--primary); background: var(--bg-muted); }
.size-btn-info .size-btn-name { font-weight: 500; color: var(--primary); display: block; }
.size-btn-info .size-btn-weight { font-size: 0.875rem; color: var(--text-muted); display: block; }
.size-btn-price { font-family: var(--font-heading); font-size: 1.25rem; color: var(--primary); }

.customizer-nav { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); }
.selection-preview { margin-top: 2rem; padding: 1.5rem; background: var(--bg-muted); }
.selection-preview h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 1rem; font-family: var(--font-body); font-weight: 500; }
.selection-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.selection-tag { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: white; border: 1px solid var(--border); font-size: 0.875rem; }

@media (max-width: 768px) { .options-grid { grid-template-columns: repeat(2, 1fr); } .scent-options, .ingredient-options { grid-template-columns: 1fr; } }

/* Checkout Page */
.checkout-section { padding: 2rem 0 6rem; }
.checkout-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; }
.checkout-form { display: flex; flex-direction: column; gap: 1.5rem; }
.form-card { background: white; padding: 1.5rem; border: 1px solid var(--border); }
.form-card h2 { font-size: 1.25rem; margin-bottom: 1.5rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 0.5rem; }
.form-group.full { grid-column: span 2; }
.form-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); }
.form-input, .form-textarea { padding: 0.75rem 1rem; border: 1px solid var(--border); font-family: inherit; font-size: 1rem; }
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
.form-textarea { resize: vertical; min-height: 100px; }

// Persistence
function saveCart() { localStorage.setItem('auralia_cart', JSON.stringify(cart)); }
function saveOrders() { localStorage.setItem('auralia_orders', JSON.stringify(orders)); }

// Cart Functions
function addToCart(item) {
    const existingIndex = cart.findIndex(c => c.productId === item.productId && c.size === item.size && c.isCustom === item.isCustom);
    if (existingIndex >= 0) { cart[existingIndex].quantity += item.quantity; }
    else { cart.push(item); }
    saveCart(); 
    cartOpen = true;
    render(); 
    showToast('Añadido al carrito');
}

function updateCartQuantity(index, delta) {
    cart[index].quantity += delta;
    if (cart[index].quantity <= 0) { cart.splice(index, 1); }
    saveCart(); render();
}

function removeFromCart(index) { cart.splice(index, 1); saveCart(); render(); }
function getCartTotal() { return cart.reduce((sum, item) => sum + item.price * item.quantity, 0); }
function getCartCount() { return cart.reduce((sum, item) => sum + item.quantity, 0); }

// Navigation
function navigate(page, param = null) {
    currentPage = page;
    currentProduct = param;
    productQty = 1;
    selectedSize = 'small';
    cartOpen = false;
    menuOpen = false;
    window.scrollTo(0, 0);
    render();
}

function toggleCart() { cartOpen = !cartOpen; render(); }
function toggleMenu() { menuOpen = !menuOpen; render(); }
function showToast(message) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMessage').textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// Main Render
function render() {
    const app = document.getElementById('app');
    let content = '';
    
    if (currentPage === 'admin') { app.innerHTML = renderAdmin(); return; }
    
    content += renderHeader();
    content += renderCartDrawer();
    
    switch(currentPage) {
        case 'home': content += renderHome(); break;
        case 'jabones': content += renderCatalog('soap'); break;
        case 'velas': content += renderCatalog('candle'); break;
        case 'temporada': content += renderCatalog('season'); break;
        case 'product': content += renderProductDetail(); break;
        case 'customizer': content += renderCustomizer(); break;
        case 'checkout': content += renderCheckout(); break;
        case 'orderComplete': content += renderOrderComplete(); break;
        default: content += renderHome();
    }
    
    content += renderFooter();
    app.innerHTML = content;
}

let selectedSize = 'small';
let selectedPrice = 0;
let productQty = 1;

function selectProductSize(el, price) {
    document.querySelectorAll('.size-option').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedSize = el.dataset.size;
    selectedPrice = price;
    updateProductTotal();
}

function changeProductQty(delta) {
    productQty = Math.max(1, productQty + delta);
    document.getElementById('productQty').textContent = productQty;
    updateProductTotal();
}

function updateProductTotal() {
    const p = products.find(prod => prod.id === currentProduct);
    const isSeasonProduct = p.category === 'season';
    const isSoap = isSeasonProduct ? p.productType === 'soap' : p.category === 'soap';
    const price = isSoap ? p.price : p.prices[selectedSize];
    document.getElementById('productTotal').textContent = '$' + (price * productQty).toFixed(isSoap ? 0 : 2);
}

function addCurrentProduct() {
    const p = products.find(prod => prod.id === currentProduct);
    const isSeasonProduct = p.category === 'season';
    const isSoap = isSeasonProduct ? p.productType === 'soap' : p.category === 'soap';
    const price = isSoap ? p.price : p.prices[selectedSize];
    const size = isSoap ? 'unico' : selectedSize;
    
    addToCart({
        productId: p.id,
        name: p.name,
        size: size,
        price: price,
        quantity: productQty,
        image: p.image,
        isCustom: false
    });
    productQty = 1;
    selectedSize = 'small';
}

    let steps = [];

        steps = ['Producto', 'Forma', 'Color', 'Aroma', 'Ingredientes'];
    } else if (customProduct.productType === 'soap') {
        steps = ['Producto', 'Forma', 'Color', 'Aroma', 'Ingredientes'];
        totalSteps = 5;
    } else {
        steps = ['Producto', 'Forma', 'Color', 'Aroma', 'Ingredientes', 'Tamaño'];
        totalSteps = 6;
    }
    
    let stepContent = '';
    
    switch(customizerStep) {
        case 0:
            stepContent = `
                <p style="text-align:center;color:var(--text-muted);margin-bottom:1.5rem">¿Qué te gustaría crear hoy?</p>

                    <button class="product-type-btn ${customProduct.productType === 'candle' ? 'active' : ''}" onclick="selectProductType('candle')">
                        <span class="type-icon"><i class="fas fa-fire"></i></span>
                        <span class="type-label">Vela</span>
                        <span class="type-price">Desde $${PRECIOS.vela.pequeno}</span>
                    </button>
                </div>
            `;
            break;
        case 1:
            stepContent = `<div class="options-grid">${customizerOptions.shapes.map(s => `
                <button class="option-btn ${customProduct.shape === s.id ? 'active' : ''}" onclick="selectCustomShape('${s.id}')">
                    <span class="option-icon">${s.icon}</span><span class="option-label">${s.label}</span>
                </button>`).join('')}</div>`;
            break;
        case 2:
            stepContent = `<div class="color-options">${customizerOptions.colors.map(c => `
                <button class="color-btn ${customProduct.color === c.id ? 'active' : ''}" onclick="selectCustomColor('${c.id}')">
                    <span class="color-swatch" style="background-color:${c.hex}"></span><span class="color-label">${c.label}</span>
                </button>`).join('')}</div>`;
            break;
        case 3:
            const scents = customProduct.productType === 'soap' ? customizerOptions.soapScents : customizerOptions.candleScents;
            stepContent = `<div class="scent-options">${scents.map(s => `
                <button class="scent-btn ${customProduct.scent === s.id ? 'active' : ''}" onclick="selectCustomScent('${s.id}')">
                    <span class="scent-name">${s.label}</span><span class="scent-desc">${s.description}</span>
                </button>`).join('')}</div>`;
            break;
        case 4:
            const ingredients = customProduct.productType === 'soap' ? customizerOptions.soapIngredients : customizerOptions.candleIngredients;
            stepContent = `<p class="ingredient-note">Selecciona hasta 3 ingredientes</p>
                <div class="ingredient-options">${ingredients.map(i => `
                <button class="ingredient-btn ${customProduct.ingredients.includes(i.id) ? 'active' : ''}" 
                    onclick="toggleCustomIngredient('${i.id}')"
                    ${customProduct.ingredients.length >= 3 && !customProduct.ingredients.includes(i.id) ? 'disabled' : ''}>
                    <span class="ingredient-name">${i.label}</span><span class="ingredient-benefit">${i.benefit}</span>
                </button>`).join('')}</div>`;
            break;
        case 5:
            if (customProduct.productType === 'candle') {
                stepContent = `<div class="size-options-customizer">${customizerOptions.candleSizes.map(s => `
                    <button class="size-btn ${customProduct.size === s.id ? 'active' : ''}" onclick="selectCustomSize('${s.id}')">
                        <div class="size-btn-info"><span class="size-btn-name">${s.label}</span><span class="size-btn-weight">${s.weight}</span></div>
                        <span class="size-btn-price">$${s.price.toFixed(2)}</span>
                    </button>`).join('')}</div>`;
            }
            break;
    }
    
    let canProceed = false;
    switch(customizerStep) {
        case 0: canProceed = !!customProduct.productType; break;
        case 1: canProceed = !!customProduct.shape; break;
        case 2: canProceed = !!customProduct.color; break;
        case 3: canProceed = !!customProduct.scent; break;
        case 4: canProceed = customProduct.ingredients.length > 0; break;
        case 5: canProceed = customProduct.productType === 'candle' && !!customProduct.size; break;
    }
    
    const isLastStep = customProduct.productType === 'soap' ? customizerStep === 4 : customizerStep === 5;
    
    const previewTags = [];
    if (customProduct.productType) {
        previewTags.push(`Producto: ${customProduct.productType === 'soap' ? 'Jabón' : 'Vela'}`);
    }
    if (customProduct.shape) previewTags.push(`Forma: ${customizerOptions.shapes.find(s => s.id === customProduct.shape).label}`);
    if (customProduct.color) { 
        const c = customizerOptions.colors.find(x => x.id === customProduct.color); 
        previewTags.push(`<span class="selection-tag">Color: <span class="color-dot" style="background:${c.hex}"></span> ${c.label}</span>`); 
    }
    if (customProduct.scent) {
        const scents = customProduct.productType === 'soap' ? customizerOptions.soapScents : customizerOptions.candleScents;
        const scent = scents.find(s => s.id === customProduct.scent);
        if (scent) previewTags.push(`Aroma: ${scent.label}`);
    }
    if (customProduct.ingredients.length) previewTags.push(`${customProduct.ingredients.length} ingrediente(s)`);
    if (customProduct.productType === 'candle' && customProduct.size) { 
        const sz = customizerOptions.candleSizes.find(s => s.id === customProduct.size); 
        previewTags.push(`${sz.label}: $${sz.price.toFixed(2)}`); 
    }
    if (customProduct.productType === 'soap') {
        previewTags.push(`Precio: $${PRECIOS.jabon}`);
    }
    
    const stepTitles = ['Tipo de Producto', 'Elige la Forma', 'Elige el Color', 'Selecciona el Aroma', 'Añade Ingredientes', 'Selecciona Tamaño'];
    
    return `
    <section class="customizer-section">
        <div class="container">
            <div class="customizer-container">
                <div class="steps-progress">
                    ${Array.from({length: totalSteps}, (_, i) => `
                        <span class="step-indicator ${i < customizerStep ? 'completed' : ''} ${i === customizerStep ? 'active' : ''}" onclick="${i < customizerStep ? `goToStep(${i})` : ''}">${i + 1}</span>
                        ${i < totalSteps - 1 ? `<span class="step-line ${i < customizerStep ? 'completed' : ''}"></span>` : ''}
                    `).join('')}
                </div>
                
                <div class="customizer-card">
                    <div class="customizer-header">
                        <span class="label">PASO ${customizerStep + 1} DE ${totalSteps}</span>
                        <h2>${stepTitles[customizerStep]}</h2>
                    </div>
                    
                    ${stepContent}
                    
                    ${previewTags.length > 0 ? `
                    <div class="selection-preview">
                        <h3>Tu selección</h3>
                        <div class="selection-tags">${previewTags.map(t => t.includes('selection-tag') ? t : `<span class="selection-tag">${t}</span>`).join('')}</div>
                    </div>` : ''}
                    
                    <div class="customizer-nav">
                        <button class="btn btn-outline" onclick="${customizerStep === 0 ? "navigate('home')" : 'prevStep()'}">
                            <i class="fas fa-arrow-left"></i> ${customizerStep === 0 ? 'CANCELAR' : 'ANTERIOR'}
                        </button>
                        ${isLastStep ? `
                            <button class="btn btn-primary" onclick="addCustomToCart()" ${!canProceed ? 'disabled style="opacity:0.5"' : ''}>
                                <i class="fas fa-shopping-bag"></i> AÑADIR AL CARRITO
                            </button>
                        ` : `
                            <button class="btn btn-primary" onclick="nextStep()" ${!canProceed ? 'disabled style="opacity:0.5"' : ''}>
                                SIGUIENTE <i class="fas fa-arrow-right"></i>
                            </button>
                        `}
                    </div>
                </div>
            </div>
        </div>
    </section>`;
}

function selectProductType(type) { customProduct.productType = type; customProduct.scent = ''; customProduct.ingredients = []; customProduct.size = 'medium'; render(); }
function selectCustomShape(id) { customProduct.shape = id; render(); }
function selectCustomColor(id) { customProduct.color = id; render(); }
function selectCustomScent(id) { customProduct.scent = id; render(); }
function selectCustomSize(id) { customProduct.size = id; render(); }
function toggleCustomIngredient(id) {
    const idx = customProduct.ingredients.indexOf(id);
    if (idx >= 0) { customProduct.ingredients.splice(idx, 1); }
    else if (customProduct.ingredients.length < 3) { customProduct.ingredients.push(id); }
    render();
}
function nextStep() { customizerStep++; render(); }
function prevStep() { customizerStep--; render(); }
function goToStep(step) { customizerStep = step; render(); }

function addCustomToCart() {
    const isSoap = customProduct.productType === 'soap';
    const price = isSoap ? PRECIOS.jabon : customizerOptions.candleSizes.find(s => s.id === customProduct.size).price;
    const size = isSoap ? 'unico' : customProduct.size;
    const productName = isSoap ? 'Jabón Personalizado' : 'Vela Personalizada';
    
    addToCart({
        productId: `custom-${Date.now()}`,
        name: productName,
        size: size,
        price: price,
        quantity: 1,
        image: isSoap ? 'https://images.pexels.com/photos/3735152/pexels-photo-3735152.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940' : 'https://images.pexels.com/photos/7234629/pexels-photo-7234629.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940',
        isCustom: true,
        customDetails: {...customProduct}
    });
    
    customProduct = { productType: '', shape: '', color: '', scent: '', ingredients: [], size: 'medium' };
    customizerStep = 0;
}

// ==========================================
// CHECKOUT
// ==========================================
function renderCheckout() {
    if (cart.length === 0) {
        return `<div class="empty-state"><i class="fas fa-shopping-bag"></i><h2>Tu carrito está vacío</h2><p>Añade productos antes de finalizar tu pedido.</p><button class="btn btn-primary" onclick="navigate('home')">IR A LA TIENDA</button></div>`;
    }
    
    return `
    <section class="checkout-section">
        <div class="container">
            <span class="back-link" onclick="navigate('home')"><i class="fas fa-arrow-left"></i> Volver a la tienda</span>
            <div class="checkout-grid">
                <div class="checkout-form">
                    <div class="form-card">
                        <h2>Información de Contacto</h2>
                        <div class="form-grid">
                            <div class="form-group"><label class="form-label">Nombre</label><input type="text" class="form-input" id="checkoutName" placeholder="Tu nombre"></div>
                            <div class="form-group"><label class="form-label">Teléfono</label><input type="tel" class="form-input" id="checkoutPhone" placeholder="Tu teléfono"></div>
                            <div class="form-group full"><label class="form-label">Email (Opcional)</label><input type="email" class="form-input" id="checkoutEmail" placeholder="tu@email.com"></div>
                        </div>
                    </div>
                    
                    <div class="form-card">
                        <h2>Dirección de Envío</h2>
                        <div class="form-grid">
                            <div class="form-group full"><label class="form-label">Dirección</label><input type="text" class="form-input" id="checkoutAddress" placeholder="Calle y número"></div>
                            <div class="form-group"><label class="form-label">Colonia</label><input type="text" class="form-input" id="checkoutColonia" placeholder="Colonia"></div>
                            <div class="form-group"><label class="form-label">Código Postal</label><input type="text" class="form-input" id="checkoutCP" placeholder="C.P."></div>
                            <div class="form-group full"><label class="form-label">Ciudad</label><input type="text" class="form-input" id="checkoutCity" placeholder="Ciudad" value="Hermosillo"></div>
                            <div class="form-group full"><label class="form-label">Notas (Opcional)</label><textarea class="form-textarea" id="checkoutNotes" placeholder="Instrucciones especiales de entrega..."></textarea></div>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary btn-full" onclick="submitOrder()"><i class="fab fa-whatsapp"></i> CONFIRMAR PEDIDO POR WHATSAPP</button>
                    <p class="form-note">Al confirmar, serás redirigido a WhatsApp para completar tu pedido.</p>
                </div>
                
                <div class="order-summary">
                    <h2>Resumen del Pedido</h2>
                    <div class="order-items">
                        ${cart.map(item => `
                            <div class="order-item">
                                <img src="${item.image}" alt="${item.name}" class="order-item-image">
                                <div class="order-item-info">
                                    <p class="order-item-name">${item.name}</p>
                                    <p class="order-item-size">${sizeLabels[item.size]} × ${item.quantity}</p>
                                    <p class="order-item-price">$${(item.price * item.quantity).toFixed(2)}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="order-totals">
                        <div class="order-total-row"><span>Subtotal</span><span>$${getCartTotal().toFixed(2)}</span></div>
                        <div class="order-total-row"><span>Envío</span><span>Por confirmar</span></div>
                        <div class="order-total-row total"><span>Total</span><span>$${getCartTotal().toFixed(2)}</span></div>
                    </div>
                </div>
            </div>
        </div>
    </section>`;
}

function submitOrder() {
    const name = document.getElementById('checkoutName').value.trim();
    const phone = document.getElementById('checkoutPhone').value.trim();
    const address = document.getElementById('checkoutAddress').value.trim();
    const colonia = document.getElementById('checkoutColonia').value.trim();
    const cp = document.getElementById('checkoutCP').value.trim();
    const city = document.getElementById('checkoutCity').value.trim();
    const notes = document.getElementById('checkoutNotes').value.trim();
    
    if (!name || !phone || !address) {
        showToast('Por favor completa los campos requeridos');
        return;
    }
    
    let message = `¡Hola! 🌿 Quisiera hacer un pedido:\n\n`;
    message += `*PRODUCTOS:*\n`;
    cart.forEach(item => {
        message += `• ${item.name} (${sizeLabels[item.size]}) x${item.quantity} - $${(item.price * item.quantity).toFixed(2)}\n`;
        if (item.isCustom && item.customDetails) {
            const cd = item.customDetails;
            message += `  _Personalizado: ${customizerOptions.shapes.find(s=>s.id===cd.shape)?.label || ''}, ${customizerOptions.colors.find(c=>c.id===cd.color)?.label || ''}_\n`;
        }
    });
    message += `\n*TOTAL: $${getCartTotal().toFixed(2)}*\n\n`;
    message += `*DATOS DE ENVÍO:*\n`;
    message += `Nombre: ${name}\n`;
    message += `Teléfono: ${phone}\n`;
    message += `Dirección: ${address}, ${colonia}, CP ${cp}, ${city}\n`;
    if (notes) message += `Notas: ${notes}\n`;
    
    const orderId = 'AUR-' + Date.now().toString(36).toUpperCase();
    orders.push({ id: orderId, items: [...cart], total: getCartTotal(), customer: { name, phone, address: `${address}, ${colonia}, CP ${cp}, ${city}` }, date: new Date().toISOString(), status: 'pending' });
    saveOrders();
    
    const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
    window.open(whatsappUrl, '_blank');
    
    cart = [];
    saveCart();
    currentPage = 'orderComplete';
    render();
}

function renderOrderComplete() {
    return `
    <div class="order-complete">
        <div class="order-complete-content">
            <div class="order-complete-icon"><i class="fas fa-check"></i></div>
            <h1>¡Pedido Enviado!</h1>
            <p>Tu pedido ha sido enviado por WhatsApp. Te contactaremos pronto para confirmar los detalles y el envío.</p>
            <p class="order-number">Gracias por tu preferencia</p>
            <button class="btn btn-primary" onclick="navigate('home')">VOLVER AL INICIO</button>
        </div>
    </div>`;
}

// ==========================================
// ADMIN PANEL
// ==========================================
function renderAdmin() {
    const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);
    const totalOrders = orders.length;
    const totalProducts = products.length;
    
    let content = `
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-logo"><span>${STORE_NAME}</span><small>Panel de Administración</small></div>
            <nav class="admin-nav">
                <div class="${adminTab === 'dashboard' ? 'active' : ''}" onclick="setAdminTab('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</div>
                <div class="${adminTab === 'orders' ? 'active' : ''}" onclick="setAdminTab('orders')"><i class="fas fa-shopping-bag"></i> Pedidos</div>
                <div class="${adminTab === 'products' ? 'active' : ''}" onclick="setAdminTab('products')"><i class="fas fa-box"></i> Productos</div>
            </nav>
            <div class="admin-back" onclick="navigate('home')"><i class="fas fa-arrow-left"></i> Volver a la tienda</div>
        </aside>
        <main class="admin-main">`;
    
    if (adminTab === 'dashboard') {
        content += `
            <div class="admin-header"><h1>Dashboard</h1></div>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">Ingresos Totales</span><div class="stat-value">$${totalRevenue.toFixed(2)}</div></div>
                <div class="stat-card"><span class="stat-label">Pedidos</span><div class="stat-value">${totalOrders}</div></div>
                <div class="stat-card"><span class="stat-label">Productos</span><div class="stat-value">${totalProducts}</div></div>
                <div class="stat-card"><span class="stat-label">Items en Carrito</span><div class="stat-value">${getCartCount()}</div></div>
            </div>
            <h2 style="margin:2rem 0 1rem;font-size:1.5rem">Últimos Pedidos</h2>
            ${orders.length === 0 ? '<p style="color:var(--text-muted)">No hay pedidos aún.</p>' : `
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead><tr><th>ID</th><th>Cliente</th><th>Total</th><th>Fecha</th><th>Estado</th></tr></thead>
                    <tbody>
                        ${orders.slice(-5).reverse().map(o => `
                            <tr>
                                <td>${o.id}</td>
                                <td>${o.customer.name}</td>
                                <td>$${o.total.toFixed(2)}</td>
                                <td>${new Date(o.date).toLocaleDateString()}</td>
                                <td><span class="featured-badge">${o.status}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`}`;
    } else if (adminTab === 'orders') {
        content += `
            <div class="admin-header"><h1>Pedidos</h1></div>
            ${orders.length === 0 ? '<p style="color:var(--text-muted)">No hay pedidos aún.</p>' : `
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead><tr><th>ID</th><th>Cliente</th><th>Productos</th><th>Total</th><th>Fecha</th><th>Estado</th></tr></thead>
                    <tbody>
                        ${orders.map(o => `
                            <tr>
                                <td>${o.id}</td>
                                <td>${o.customer.name}<br><small style="color:var(--text-muted)">${o.customer.phone}</small></td>
                                <td>${o.items.length} item(s)</td>
                                <td>$${o.total.toFixed(2)}</td>
                                <td>${new Date(o.date).toLocaleDateString()}</td>
                                <td>
                                    <select class="admin-select" onchange="updateOrderStatus('${o.id}', this.value)">
                                        <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pendiente</option>
                                        <option value="confirmed" ${o.status === 'confirmed' ? 'selected' : ''}>Confirmado</option>
                                        <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Enviado</option>
                                        <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Entregado</option>
                                    </select>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`}`;
    } else if (adminTab === 'products') {
        content += `
            <div class="admin-header"><h1>Productos</h1></div>
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead><tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Destacado</th></tr></thead>
                    <tbody>
                        ${products.map(p => {
                            const cat = p.category === 'soap' ? 'Jabón' : (p.category === 'candle' ? 'Vela' : 'Temporada');
                            const price = p.category === 'soap' || (p.category === 'season' && p.productType === 'soap') ? `$${p.price}` : `Desde $${p.prices.small.toFixed(2)}`;
                            return `
                            <tr>
                                <td><div class="product-cell"><img src="${p.image}" alt="${p.name}"><span>${p.name}</span></div></td>
                                <td>${cat}</td>
                                <td>${price}</td>
                                <td><button class="action-btn" onclick="toggleFeatured('${p.id}')"><i class="fas fa-star" style="color:${p.featured ? '#DAA520' : 'var(--text-muted)'}"></i></button></td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>`;
    }
    
    content += `</main></div>`;
    return content;
}

function setAdminTab(tab) { adminTab = tab; render(); }
function updateOrderStatus(id, status) {
    const order = orders.find(o => o.id === id);
    if (order) { order.status = status; saveOrders(); showToast('Estado actualizado'); }
}
function toggleFeatured(id) {
    const product = products.find(p => p.id === id);
    if (product) { product.featured = !product.featured; localStorage.setItem('auralia_products', JSON.stringify(products)); render(); showToast(product.featured ? 'Producto destacado' : 'Producto no destacado'); }
}

// Initialize
render();
    </script>
</body>
</html>
